<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>邀请成员弹窗 - 方案二</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { theme: { extend: { colors: { brand: "#5B5BFF" } } } };
    </script>
    <style>
      body {
        margin: 0;
        min-width: 320px;
        font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        background:
          radial-gradient(circle at top, rgba(91, 91, 255, 0.12), transparent 38%),
          linear-gradient(180deg, #f8faff 0%, #eef2ff 100%);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel">
      const { useEffect, useMemo, useRef, useState } = React;

      const members = [
        { uid: "123456", nickname: "蛇恋就是最好嗑的" },
        { uid: "128447390", nickname: "青木原声" },
        { uid: "682140975", nickname: "言外之音" },
        { uid: "451902638", nickname: "深夜校音室" },
        { uid: "905773214", nickname: "云边对白组" },
        { uid: "556184203", nickname: "北辰后期" },
        { uid: "710245688", nickname: "落纸成声" },
        { uid: "834196275", nickname: "雾屿旁白" },
        { uid: "249317560", nickname: "木川审听间" },
        { uid: "618420937", nickname: "对白练习生" },
      ];

      const roles = [
        { key: "editor", label: "编辑", unit: "元/万字" },
        { key: "reviewer", label: "审听", unit: "元/小时" },
        { key: "narrator", label: "旁白", unit: "元/小时" },
        { key: "dialogue", label: "对白", unit: "元/小时" },
      ];

      const emptyRoles = {
        editor: false,
        reviewer: false,
        narrator: false,
        dialogue: false,
      };

      const emptyPrices = {
        editor: "",
        reviewer: "",
        narrator: "",
        dialogue: "",
      };

      const formatMember = (member) => `[${member.uid}] ${member.nickname}`;

      function App() {
        const [open, setOpen] = useState(true);
        const [keyword, setKeyword] = useState("");
        const [items, setItems] = useState([]);
        const [pendingUids, setPendingUids] = useState([]);
        const [isDropdownOpen, setIsDropdownOpen] = useState(false);
        const [toastVisible, setToastVisible] = useState(false);
        const dropdownRef = useRef(null);

        const filteredMembers = useMemo(() => {
          const query = keyword.trim().toLowerCase();
          const source = !query
            ? members
            : members.filter((member) => {
                const text = formatMember(member).toLowerCase();
                return (
                  text.includes(query) ||
                  member.uid.includes(query) ||
                  member.nickname.toLowerCase().includes(query)
                );
              });
          return source.filter(
            (member) => !items.some((item) => item.member.uid === member.uid),
          );
        }, [items, keyword]);

        useEffect(() => {
          function handlePointerDown(event) {
            if (!dropdownRef.current?.contains(event.target)) {
              setIsDropdownOpen(false);
            }
          }
          window.addEventListener("mousedown", handlePointerDown);
          return () => window.removeEventListener("mousedown", handlePointerDown);
        }, []);

        useEffect(() => {
          if (!toastVisible) return;
          const timer = window.setTimeout(() => setToastVisible(false), 2200);
          return () => window.clearTimeout(timer);
        }, [toastVisible]);

        function addMember(member) {
          setItems((current) => {
            if (current.some((item) => item.member.uid === member.uid)) return current;
            return [
              ...current,
              {
                member,
                roles: { ...emptyRoles },
                prices: { ...emptyPrices },
              },
            ];
          });
          setKeyword("");
          setPendingUids([]);
          setIsDropdownOpen(false);
        }

        function handleManualAdd() {
          const trimmed = keyword.trim();
          if (!trimmed) return;
          const matched = members.find(
            (member) =>
              member.uid === trimmed ||
              formatMember(member).toLowerCase() === trimmed.toLowerCase(),
          );
          addMember(matched ?? { uid: trimmed, nickname: "" });
        }

        function togglePending(uid) {
          setPendingUids((current) =>
            current.includes(uid)
              ? current.filter((item) => item !== uid)
              : [...current, uid],
          );
        }

        function handleAddSelected() {
          if (pendingUids.length === 0) return;
          const selectedMembers = members.filter((member) =>
            pendingUids.includes(member.uid),
          );

          setItems((current) => {
            const existing = new Set(current.map((item) => item.member.uid));
            const next = [...current];
            selectedMembers.forEach((member) => {
              if (!existing.has(member.uid)) {
                next.push({
                  member,
                  roles: { ...emptyRoles },
                  prices: { ...emptyPrices },
                });
              }
            });
            return next;
          });

          setKeyword("");
          setPendingUids([]);
          setIsDropdownOpen(false);
        }

        function toggleRole(uid, roleKey) {
          setItems((current) =>
            current.map((item) => {
              if (item.member.uid !== uid) return item;
              const checked = !item.roles[roleKey];
              return {
                ...item,
                roles: { ...item.roles, [roleKey]: checked },
                prices: checked
                  ? item.prices
                  : { ...item.prices, [roleKey]: "" },
              };
            }),
          );
        }

        function updatePrice(uid, roleKey, value) {
          setItems((current) =>
            current.map((item) =>
              item.member.uid === uid
                ? {
                    ...item,
                    prices: {
                      ...item.prices,
                      [roleKey]: value.replace(/[^0-9.]/g, ""),
                    },
                  }
                : item,
            ),
          );
        }

        function removeMember(uid) {
          setItems((current) => current.filter((item) => item.member.uid !== uid));
        }

        function handleConfirm() {
          if (items.length === 0) return;
          setItems([]);
          setKeyword("");
          setIsDropdownOpen(false);
          setToastVisible(true);
        }

        return (
          <main className="min-h-screen px-6 py-12">
            <div className="mx-auto max-w-5xl rounded-[28px] border border-white/70 bg-white/80 p-8 shadow-[0_20px_60px_rgba(15,23,42,0.08)] backdrop-blur">
              <div className="text-sm font-medium uppercase tracking-[0.22em] text-brand">
                方案二
              </div>
              <h1 className="mt-2 text-3xl font-semibold text-slate-900">批量邀请成员弹窗</h1>
              <p className="mt-2 max-w-2xl text-[15px] leading-7 text-slate-600">
                成员会一位位加入待配置列表，每张卡片独立配置身份与价格，最后统一提交。
              </p>
              <button
                type="button"
                onClick={() => setOpen(true)}
                className="mt-6 h-11 rounded-xl bg-brand px-5 text-[15px] font-medium text-white shadow-[0_12px_30px_rgba(91,91,255,0.24)] transition hover:-translate-y-[1px]"
              >
                打开方案二
              </button>
            </div>

            {open && (
              <>
                <div className="fixed inset-0 z-40 bg-slate-950/20 backdrop-blur-[2px]" />
                <div className="fixed inset-0 z-50 flex items-center justify-center p-6">
                  <div className="relative flex h-[min(84vh,860px)] w-full max-w-[920px] flex-col overflow-hidden rounded-[24px] bg-white px-8 py-7 shadow-[0_18px_80px_rgba(15,23,42,0.16)]">
                    <button
                      type="button"
                      onClick={() => setOpen(false)}
                      className="absolute right-7 top-7 flex h-9 w-9 items-center justify-center rounded-full text-slate-400 transition hover:bg-slate-100 hover:text-slate-600"
                      aria-label="关闭弹窗"
                    >
                      <svg viewBox="0 0 24 24" className="h-6 w-6" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round">
                        <path d="M6 6L18 18" />
                        <path d="M18 6L6 18" />
                      </svg>
                    </button>

                    <div className="mb-5">
                      <div className="mb-2 text-[13px] font-medium uppercase tracking-[0.22em] text-brand">
                        方案二
                      </div>
                      <h2 className="text-[30px] font-semibold tracking-[-0.02em] text-slate-900">
                        邀请成员
                      </h2>
                    </div>

                    <div ref={dropdownRef} className="relative">
                      <label className="mb-3 block text-[15px] font-medium text-slate-800">
                        搜索成员
                      </label>
                      <p className="mb-3 text-[13px] text-slate-400">
                        勾选多个成员后，可一次加入下方待配置列表
                      </p>
                      <div className="relative">
                        <input
                          value={keyword}
                          onChange={(event) => {
                            setKeyword(event.target.value);
                            setIsDropdownOpen(true);
                          }}
                          onFocus={() => setIsDropdownOpen(true)}
                          onKeyDown={(event) => {
                            if (event.key === "Enter") handleManualAdd();
                          }}
                          placeholder="输入喜马UID或昵称搜索..."
                          className="h-14 w-full rounded-2xl border border-slate-200 bg-white pl-4 pr-14 text-[16px] text-slate-900 outline-none transition placeholder:text-slate-400 focus:border-brand focus:ring-4 focus:ring-brand/10"
                        />
                        <button
                          type="button"
                          onClick={handleManualAdd}
                          className="absolute inset-y-0 right-0 flex w-14 items-center justify-center text-slate-400 transition hover:text-brand"
                          aria-label="添加成员"
                        >
                          <svg viewBox="0 0 24 24" className="h-5 w-5" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                            <circle cx="11" cy="11" r="7" />
                            <path d="m20 20-3.5-3.5" />
                          </svg>
                        </button>
                      </div>

                      {isDropdownOpen && (
                        <div className="absolute left-0 right-0 top-full z-20 mt-2 overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-[0_18px_50px_rgba(15,23,42,0.12)]">
                          {filteredMembers.length > 0 ? (
                            <>
                              <div className="flex items-center justify-between border-b border-slate-100 bg-slate-50/80 px-4 py-3">
                                <span className="text-[13px] font-medium text-slate-500">常用用户</span>
                                <span className="text-[12px] text-slate-400">可多选后批量加入</span>
                              </div>
                              <ul className="max-h-60 overflow-y-auto py-2">
                                {filteredMembers.map((member) => (
                                  <li key={member.uid}>
                                    <label className="flex cursor-pointer items-center justify-between gap-4 px-4 py-3 text-[15px] text-slate-700 transition hover:bg-brand/5 hover:text-slate-900">
                                      <span>{formatMember(member)}</span>
                                      <input
                                        type="checkbox"
                                        checked={pendingUids.includes(member.uid)}
                                        onChange={() => togglePending(member.uid)}
                                        className="h-[18px] w-[18px] rounded border-slate-300 accent-brand"
                                      />
                                    </label>
                                  </li>
                                ))}
                              </ul>
                              <div className="sticky bottom-0 flex items-center justify-between border-t border-slate-100 bg-white px-4 py-3">
                                <span className="text-[13px] text-slate-400">已勾选 {pendingUids.length} 人</span>
                                <button
                                  type="button"
                                  onClick={handleAddSelected}
                                  disabled={pendingUids.length === 0}
                                  className="h-9 rounded-lg px-4 text-[14px] font-medium text-white transition disabled:cursor-not-allowed disabled:bg-slate-200 disabled:text-slate-500"
                                  style={{
                                    backgroundColor:
                                      pendingUids.length === 0 ? undefined : "#5B5BFF",
                                  }}
                                >
                                  加入列表（{pendingUids.length}人）
                                </button>
                              </div>
                            </>
                          ) : (
                            <div className="px-4 py-5 text-[14px] text-slate-400">未搜索到可添加成员</div>
                          )}
                        </div>
                      )}
                    </div>

                    <div className="mt-6 flex min-h-0 flex-1 flex-col">
                      <div className="mb-3 flex items-center justify-between">
                        <h3 className="text-[16px] font-semibold text-slate-900">待配置列表</h3>
                        <span className="text-[13px] text-slate-400">已选择 {items.length} 人</span>
                      </div>

                      <div className="min-h-[220px] flex-1 overflow-y-auto rounded-[22px] border border-slate-200 bg-slate-50/70 p-3 pt-4">
                        {items.length > 0 ? (
                          <div className="space-y-4">
                            {items.map((item) => {
                              const selectedRoles = roles.filter((role) => item.roles[role.key]);
                              return (
                                <div key={item.member.uid} className="rounded-[18px] border border-slate-200 bg-white p-4 shadow-[0_10px_30px_rgba(15,23,42,0.04)]">
                                  <div className="mb-4 flex items-start justify-between gap-4">
                                    <div>
                                      <div className="text-[17px] font-semibold text-slate-900">{formatMember(item.member)}</div>
                                      <div className="mt-1 text-[13px] text-slate-400">单张卡片独立配置身份与价格</div>
                                    </div>
                                    <button
                                      type="button"
                                      onClick={() => removeMember(item.member.uid)}
                                      className="flex h-8 w-8 items-center justify-center rounded-full text-slate-400 transition hover:bg-slate-100 hover:text-slate-600"
                                      aria-label="移除成员"
                                    >
                                      <svg viewBox="0 0 24 24" className="h-5 w-5" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round">
                                        <path d="M6 6L18 18" />
                                        <path d="M18 6L6 18" />
                                      </svg>
                                    </button>
                                  </div>

                                  <div className="mb-4 flex flex-wrap gap-x-6 gap-y-3">
                                    {roles.map((role) => (
                                      <label key={role.key} className="flex cursor-pointer items-center gap-2 text-[15px] text-slate-800">
                                        <input
                                          type="checkbox"
                                          checked={item.roles[role.key]}
                                          onChange={() => toggleRole(item.member.uid, role.key)}
                                          className="h-[18px] w-[18px] rounded border-slate-300 accent-brand"
                                        />
                                        <span>{role.label}</span>
                                      </label>
                                    ))}
                                  </div>

                                  {selectedRoles.length > 0 && (
                                    <div className="grid gap-3 rounded-2xl border border-slate-100 bg-slate-50/80 p-4">
                                      {selectedRoles.map((role) => (
                                        <div key={role.key} className="grid gap-3 md:grid-cols-[96px_1fr]">
                                          <label className="pt-2 text-[14px] font-medium text-slate-700">{role.label}单价</label>
                                          <div className="flex items-center gap-3">
                                            <input
                                              inputMode="decimal"
                                              value={item.prices[role.key]}
                                              onChange={(event) => updatePrice(item.member.uid, role.key, event.target.value)}
                                              placeholder="请输入"
                                              className="h-10 w-full max-w-[220px] rounded-xl border border-slate-200 bg-white px-4 text-[15px] text-slate-900 outline-none transition placeholder:text-slate-400 focus:border-brand focus:ring-4 focus:ring-brand/10"
                                            />
                                            <span className="text-[14px] text-slate-600">{role.unit}</span>
                                          </div>
                                        </div>
                                      ))}
                                    </div>
                                  )}
                                </div>
                              );
                            })}
                          </div>
                        ) : (
                          <div className="flex h-full min-h-[228px] items-center justify-center rounded-[18px] border border-dashed border-slate-200 bg-white text-[14px] text-slate-400">
                            先从上方搜索并添加成员，再在这里逐个配置身份和价格
                          </div>
                        )}
                      </div>
                    </div>

                    <div className="mt-5 flex shrink-0 flex-col gap-4 border-t border-slate-100 bg-white pt-5 md:flex-row md:items-center md:justify-between">
                      <div className="flex items-center gap-2 text-[15px] text-slate-700">
                        <span className="font-medium text-slate-800">结算方式：</span>
                        <span>自动月结</span>
                      </div>

                      <div className="flex items-center justify-end gap-3">
                        <button
                          type="button"
                          onClick={() => setOpen(false)}
                          className="h-11 rounded-xl border border-slate-200 bg-white px-5 text-[15px] font-medium text-slate-700 transition hover:border-slate-300 hover:bg-slate-50"
                        >
                          取消
                        </button>
                        <button
                          type="button"
                          onClick={handleConfirm}
                          disabled={items.length === 0}
                          className={`h-11 rounded-xl px-5 text-[15px] font-medium text-white transition ${
                            items.length === 0
                              ? "cursor-not-allowed bg-slate-200 text-slate-500"
                              : "bg-brand shadow-[0_12px_30px_rgba(91,91,255,0.28)]"
                          }`}
                        >
                          确认邀请（{items.length}人）
                        </button>
                      </div>
                    </div>
                  </div>
                </div>
              </>
            )}

            <div className="pointer-events-none fixed inset-x-0 top-6 z-[60] flex justify-center px-6">
              <div
                className={`rounded-xl bg-slate-900 px-4 py-2 text-[14px] text-white shadow-lg transition-all duration-200 ${
                  toastVisible ? "translate-y-0 opacity-100" : "-translate-y-2 opacity-0"
                }`}
              >
                批量邀请成功
              </div>
            </div>
          </main>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
