<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>邀请成员弹窗方案预览</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: "#5B5BFF",
            },
          },
        },
      };
    </script>
    <style>
      body {
        margin: 0;
        min-width: 320px;
        font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Helvetica, Arial, sans-serif;
        background:
          radial-gradient(circle at top, rgba(91, 91, 255, 0.12), transparent 38%),
          linear-gradient(180deg, #f8faff 0%, #eef2ff 100%);
      }
    </style>
  </head>
  <body>
    <main class="min-h-screen px-6 py-12">
      <div class="mx-auto max-w-6xl rounded-[28px] border border-white/70 bg-white/80 p-8 shadow-[0_20px_60px_rgba(15,23,42,0.08)] backdrop-blur">
        <p class="text-sm font-medium uppercase tracking-[0.22em] text-brand">Demo Preview</p>
        <h1 class="mt-2 text-3xl font-semibold text-slate-900">邀请成员弹窗方案</h1>
        <p class="mt-2 max-w-3xl text-[15px] leading-7 text-slate-600">
          这里汇总了三个版本的弹窗原型，可分别查看单人配置流、批量配置流和项目导入流。
        </p>

        <div class="mt-8 grid gap-4 md:grid-cols-4">
          <a
            href="./preview.html"
            class="rounded-[24px] border border-slate-200 bg-white p-6 shadow-sm transition hover:-translate-y-[1px] hover:shadow-md"
          >
            <div class="mb-3 text-[13px] font-medium uppercase tracking-[0.18em] text-slate-400">方案一</div>
            <h2 class="text-[22px] font-semibold text-slate-900">单人配置流</h2>
            <p class="mt-2 text-[14px] leading-7 text-slate-600">
              先选成员，再配置身份与单价，适合逐个邀请。
            </p>
            <span class="mt-6 inline-flex h-11 items-center rounded-xl bg-brand px-5 text-[15px] font-medium text-white shadow-[0_12px_30px_rgba(91,91,255,0.24)]">
              打开方案一
            </span>
          </a>

          <a
            href="./preview-batch.html"
            class="rounded-[24px] border border-slate-200 bg-white p-6 shadow-sm transition hover:-translate-y-[1px] hover:shadow-md"
          >
            <div class="mb-3 text-[13px] font-medium uppercase tracking-[0.18em] text-slate-400">方案二</div>
            <h2 class="text-[22px] font-semibold text-slate-900">批量配置流</h2>
            <p class="mt-2 text-[14px] leading-7 text-slate-600">
              多选成员后统一加入列表，再分别配置身份与价格。
            </p>
            <span class="mt-6 inline-flex h-11 items-center rounded-xl bg-brand px-5 text-[15px] font-medium text-white shadow-[0_12px_30px_rgba(91,91,255,0.24)]">
              打开方案二
            </span>
          </a>

          <a
            href="./preview-import.html"
            class="rounded-[24px] border border-slate-200 bg-white p-6 shadow-sm transition hover:-translate-y-[1px] hover:shadow-md"
          >
            <div class="mb-3 text-[13px] font-medium uppercase tracking-[0.18em] text-slate-400">方案三</div>
            <h2 class="text-[22px] font-semibold text-slate-900">项目导入流</h2>
            <p class="mt-2 text-[14px] leading-7 text-slate-600">
              支持常用用户搜索和从已有作品导入历史班底。
            </p>
            <span class="mt-6 inline-flex h-11 items-center rounded-xl bg-brand px-5 text-[15px] font-medium text-white shadow-[0_12px_30px_rgba(91,91,255,0.24)]">
              打开方案三
            </span>
          </a>

          <a
            href="./ProjectMemberImport-final.html"
            class="rounded-[24px] border border-slate-200 bg-white p-6 shadow-sm transition hover:-translate-y-[1px] hover:shadow-md"
          >
            <div class="mb-3 text-[13px] font-medium uppercase tracking-[0.18em] text-slate-400">最终版</div>
            <h2 class="text-[22px] font-semibold text-slate-900">项目成员导入</h2>
            <p class="mt-2 text-[14px] leading-7 text-slate-600">
              单文件成品，可直接发给他人预览和演示。
            </p>
            <span class="mt-6 inline-flex h-11 items-center rounded-xl bg-brand px-5 text-[15px] font-medium text-white shadow-[0_12px_30px_rgba(91,91,255,0.24)]">
              打开最终版
            </span>
          </a>
        </div>
      </div>
    </main>
  </body>
</html>
